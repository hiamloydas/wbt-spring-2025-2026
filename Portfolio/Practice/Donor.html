<!DOCTYPE html>
<html>
<head>
    <title>Donor Information</title>
    <link rel="stylesheet" href="Donor.css">
</head>
<body>

<h2>Donor Information</h2>

<form>
<label>First Name <span class="required">*</span></label>

<input type="text"><br><br>

<label>Last Name <span class="required">*</span></label>
<input type="text"><br><br>

<label>Company <span class="required">*</span></label>
<input type="text"><br><br>

<label>Address 1 <span class="required">*</span></label>
<input type="text"><br><br>

<label>Address 2<span class="required">*</span></label>
<input type="text"><br><br>

<label>City <span class="required">*</span></label>
<input type="text"><br><br>

<label>State <span class="required">*</span></label>
<select>
    <option>Select a State</option>
    <option>Dhaka</option>
    <option>Barishal</option>
</select><br><br>

<label>Zip Code <span class="required">*</span></label>
<input type="text"><br><br>

<label>Country <span class="required">*</span></label>
<select>
    <option>Select a Country</option>
    <option>Bangladesh</option>
    <option>India</option>
</select><br><br>

<label>Phone <span class="required">*</span></label>
<input type="text"><br><br>

<label>Fax <span class="required">*</span></label>
<input type="text"><br><br>

<label>Email<span class="required">*</span></label>
<input type="email"><br><br>

<label>Donation Amount <span class="required">*</span></label><br>

<input type="radio" name="amount"> None
<input type="radio" name="amount"> $50
<input type="radio" name="amount"> $75
<input type="radio" name="amount"> $100
<input type="radio" name="amount"> $250
<input type="radio" name="amount"> Other
<br><br>

<label>Other Amount $</label>
<input type="text"><br><br>

<input type="checkbox"> I am interested in giving on a regular basis.
<br><br>

</form>

</body>
</html>
